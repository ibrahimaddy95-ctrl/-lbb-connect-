<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabbatarwa - LBB Connect</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body style="padding-bottom:20px;">

<div class="topbar">
  <span onclick="history.back()" style="cursor:pointer;">←</span>
  <h1 style="font-size:15px;">Tabbatar da Kasuwanci</h1>
  <span></span>
</div>

<div style="padding:16px;">
  <p style="font-size:13px; color:#6b7280; margin-bottom:16px;">
    Verified badge yana kara wa masu saye/sabis amana. Kudin tabbatarwa: ₦2,000.
  </p>

  <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">Sunan Kasuwanci</label>
  <input type="text" id="businessName" style="width:100%;padding:12px;margin-bottom:14px;border:1px solid #ddd;border-radius:8px;">

  <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">NIN ko CAC Number</label>
  <input type="text" id="idNumber" style="width:100%;padding:12px;margin-bottom:14px;border:1px solid #ddd;border-radius:8px;">

  <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">Hoto na ID/CAC</label>
  <input type="file" id="idImage" accept="image/*" style="width:100%;margin-bottom:20px;">

  <button class="btn" onclick="submitVerification()">Aika don Tabbatarwa</button>
  <p id="statusMsg" style="text-align:center; margin-top:10px; font-size:13px;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
let uid = null;
requireAuth((user) => { uid = user.uid; });

async function submitVerification() {
  const statusMsg = document.getElementById("statusMsg");
  const businessName = document.getElementById("businessName").value.trim();
  const idNumber = document.getElementById("idNumber").value.trim();
  const idFile = document.getElementById("idImage").files[0];

  if (!businessName || !idNumber || !idFile) {
    statusMsg.style.color = "#e53935";
    statusMsg.textContent = "Cika duk fields kuma zabi hoto.";
    return;
  }

  statusMsg.style.color = "#6b7280";
  statusMsg.textContent = "Ana aikawa... (za a bukaci biyan ₦2,000 kafin a kammala, wanda za mu kara da Paystack)";

  try {
    const ref = storage.ref(`verifications/${uid}/${Date.now()}_${idFile.name}`);
    await ref.put(idFile);
    const idImageUrl = await ref.getDownloadURL();

    await db.collection("users").doc(uid).update({
      businessName,
      verificationRequest: {
        idNumber,
        idImageUrl,
        status: "pending",
        submittedAt: firebase.firestore.FieldValue.serverTimestamp()
      }
    });

    statusMsg.style.color = "#2e7d32";
    statusMsg.textContent = "An aika! Za a duba a cikin kwanaki 1-2.";
    setTimeout(() => window.location.href = "profile.html", 1500);
  } catch (err) {
    console.error(err);
    statusMsg.style.color = "#e53935";
    statusMsg.textContent = "An samu matsala.";
  }
}
</script>
</body>
</html>
