<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing - LBB Connect</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body style="padding-bottom:90px;">

<div class="topbar">
  <span onclick="history.back()" style="cursor:pointer;">←</span>
  <h1 style="font-size:15px;">Bayani</h1>
  <span></span>
</div>

<div id="content">
  <p style="padding:20px; color:#6b7280;">Ana lodi...</p>
</div>

<div id="actionBar" style="position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e5e7eb; padding:10px 16px; display:none; gap:10px;">
  <button class="btn secondary" style="flex:1;" onclick="startChat()">💬 Chat</button>
  <button class="btn" style="flex:1;" id="reviewBtn" onclick="window.location.href='review.html?id=' + listingId">⭐ Review</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const listingId = params.get("id");
let listingData = null;
let sellerData = null;

async function loadListing() {
  if (!listingId) {
    document.getElementById("content").innerHTML = "<p style='padding:20px;'>Listing ba a samu ba.</p>";
    return;
  }

  try {
    const doc = await db.collection("listings").doc(listingId).get();
    if (!doc.exists) {
      document.getElementById("content").innerHTML = "<p style='padding:20px;'>Listing din ba ya nan.</p>";
      return;
    }
    listingData = { id: doc.id, ...doc.data() };

    // Increment views
    db.collection("listings").doc(listingId).update({
      views: firebase.firestore.FieldValue.increment(1)
    });

    // Load seller info
    const sellerDoc = await db.collection("users").doc(listingData.userId).get();
    sellerData = sellerDoc.exists ? sellerDoc.data() : null;

    renderListing();
  } catch (err) {
    console.error(err);
    document.getElementById("content").innerHTML = "<p style='padding:20px;color:#e53935;'>An samu matsala.</p>";
  }
}

function renderListing() {
  const imagesHtml = listingData.images && listingData.images.length > 0
    ? `<div style="display:flex; overflow-x:auto; gap:0;">
        ${listingData.images.map(img => `<img src="${img}" style="width:100%; height:260px; object-fit:cover; flex-shrink:0;">`).join('')}
       </div>`
    : `<img src="https://placehold.co/400x260?text=LBB+Connect" style="width:100%; height:260px; object-fit:cover;">`;

  document.getElementById("content").innerHTML = `
    ${imagesHtml}
    <div style="padding:16px;">
      <h2 style="font-size:19px; margin-bottom:6px;">${listingData.title}</h2>
      ${listingData.price ? `<div style="font-size:20px; font-weight:700; color:#0a1f44; margin-bottom:10px;">${formatPrice(listingData.price)}</div>` : ''}
      <div style="font-size:13px; color:#6b7280; margin-bottom:16px;">📍 ${listingData.location?.city || ''}, ${listingData.location?.state || ''} · ${timeAgo(listingData.createdAt)}</div>

      <div style="border-top:1px solid #eee; padding-top:14px; margin-bottom:14px;">
        <h3 style="font-size:14px; margin-bottom:6px;">Description</h3>
        <p style="font-size:14px; color:#374151; line-height:1.5;">${listingData.description}</p>
      </div>

      <div style="border-top:1px solid #eee; padding-top:14px;">
        <h3 style="font-size:14px; margin-bottom:8px;">Mai Sayarwa</h3>
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="width:44px;height:44px;border-radius:50%;background:#0a1f44;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">
            ${(sellerData?.name || "U")[0].toUpperCase()}
          </div>
          <div>
            <div style="font-weight:600; font-size:14px;">
              ${sellerData?.name || "User"}
              ${sellerData?.verified ? '<span class="verified">✓ Verified</span>' : ''}
            </div>
            <div style="font-size:12px; color:#6b7280;">⭐ ${(sellerData?.rating || 0).toFixed(1)} (${sellerData?.reviewCount || 0} reviews)</div>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById("actionBar").style.display = "flex";
}

async function startChat() {
  const user = auth.currentUser;
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  if (user.uid === listingData.userId) {
    alert("Wannan listing dinka ne, ba za ka iya chat da kanka ba.");
    return;
  }

  // Check if chat already exists between these two users for this listing
  const existing = await db.collection("chats")
    .where("participants", "array-contains", user.uid)
    .where("listingId", "==", listingId)
    .limit(1)
    .get();

  let chatId;
  if (!existing.empty) {
    chatId = existing.docs[0].id;
  } else {
    const newChat = await db.collection("chats").add({
      participants: [user.uid, listingData.userId],
      listingId: listingId,
      lastMessage: "",
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      unreadCount: { [user.uid]: 0, [listingData.userId]: 0 }
    });
    chatId = newChat.id;
  }

  window.location.href = "chat.html?id=" + chatId;
}

loadListing();
</script>
</body>
</html>
