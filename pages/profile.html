<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - LBB Connect</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="topbar">
  <h1>Profile</h1>
  <span></span>
</div>

<div id="profileContent">
  <p style="padding:20px; color:#6b7280;">Ana lodi...</p>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item"><span class="icon">🏠</span><span>Home</span></a>
  <a href="search.html" class="nav-item"><span class="icon">🔍</span><span>Search</span></a>
  <a href="post.html" class="nav-item post-btn"><span class="icon">+</span><span>Post</span></a>
  <a href="chat-list.html" class="nav-item"><span class="icon">💬</span><span>Chat</span></a>
  <a href="profile.html" class="nav-item active"><span class="icon">👤</span><span>Profile</span></a>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
requireAuth(async (user) => {
  const userDoc = await db.collection("users").doc(user.uid).get();
  const userData = userDoc.exists ? userDoc.data() : {};

  document.getElementById("profileContent").innerHTML = `
    <div style="background:#0a1f44; color:#fff; padding:24px 16px; display:flex; align-items:center; gap:14px;">
      <div style="width:60px;height:60px;border-radius:50%;background:#f4b400;color:#0a1f44;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;">
        ${(userData.name || "U")[0].toUpperCase()}
      </div>
      <div>
        <div style="font-size:17px; font-weight:700;">${userData.name || "User"}</div>
        <div style="font-size:12px; opacity:0.85;">
          ${userData.verified ? '✓ Verified' : 'Ba a tabbatar ba'} · ⭐ ${(userData.rating || 0).toFixed(1)} (${userData.reviewCount || 0})
        </div>
      </div>
    </div>

    <div style="background:#fff; margin:16px; border-radius:12px; padding:16px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <div>
        <div style="font-size:12px; color:#6b7280;">Wallet Balance</div>
        <div style="font-size:22px; font-weight:700; color:#0a1f44;">${formatPrice(userData.walletBalance || 0)}</div>
      </div>
      <button class="btn" style="width:auto; padding:10px 18px;" onclick="alert('Wallet top-up zai zo nan gaba tare da Paystack integration.')">+ Add Money</button>
    </div>

    <div style="background:#fff; margin:0 16px 16px; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <div class="menu-item" onclick="window.location.href='my-listings.html'">📦 Listings na</div>
      <div class="menu-item" onclick="window.location.href='edit-profile.html'">✏️ Gyara Profile</div>
      <div class="menu-item" onclick="window.location.href='verification.html'">✅ Tabbatar da Kasuwanci</div>
      <div class="menu-item" onclick="alert('Za mu kara wannan nan gaba.')">🔔 Notifications</div>
      <div class="menu-item" onclick="alert('Za mu kara wannan nan gaba.')">❓ Taimako / Support</div>
      <div class="menu-item" style="color:#e53935;" onclick="logout()">🚪 Fita (Logout)</div>
    </div>
  `;
});

async function logout() {
  await auth.signOut();
  window.location.href = "login.html";
}
</script>

<style>
.menu-item {
  padding: 14px 16px;
  font-size: 14px;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
}
.menu-item:last-child { border-bottom: none; }
</style>
</body>
</html>
