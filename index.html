<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LBB Connect</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1f44">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <h1>LBB Connect</h1>
  <span id="walletQuick" style="font-size:13px;">₦0</span>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Nemi kaya, sabis, ko shago...">
</div>

<div class="chips" id="categoryChips">
  <div class="chip active" data-type="all">Duka</div>
  <div class="chip" data-type="marketplace">Marketplace</div>
  <div class="chip" data-type="service">Services</div>
  <div class="chip" data-type="directory">Directory</div>
</div>

<div class="listings-grid" id="listingsGrid">
  <!-- Listings suna zuwa nan ta hanyar JS -->
</div>

<div class="empty-state" id="emptyState" style="display:none;">
  <p>Babu listings a wannan category tukuna.</p>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <span class="icon">🏠</span><span>Home</span>
  </a>
  <a href="pages/search.html" class="nav-item">
    <span class="icon">🔍</span><span>Search</span>
  </a>
  <a href="pages/post.html" class="nav-item post-btn">
    <span class="icon">+</span><span>Post</span>
  </a>
  <a href="pages/chat-list.html" class="nav-item">
    <span class="icon">💬</span><span>Chat</span>
  </a>
  <a href="pages/profile.html" class="nav-item">
    <span class="icon">👤</span><span>Profile</span>
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/home.js"></script>

</body>
</html>
