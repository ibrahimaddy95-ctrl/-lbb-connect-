<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listings Na - LBB Connect</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="topbar">
  <span onclick="history.back()" style="cursor:pointer;">←</span>
  <h1 style="font-size:15px;">Listings Na</h1>
  <span></span>
</div>

<div id="listingsContainer">
  <p style="padding:20px; color:#6b7280;">Ana lodi...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
requireAuth(async (user) => {
  const snapshot = await db.collection("listings")
    .where("userId", "==", user.uid)
    .orderBy("createdAt", "desc")
    .get();

  const container = document.getElementById("listingsContainer");
  if (snapshot.empty) {
    container.innerHTML = `<div class="empty-state"><p>Ba ka saka listing ba tukuna.</p></div>`;
    return;
  }

  container.innerHTML = "";
  snapshot.forEach(doc => {
    const listing = { id: doc.id, ...doc.data() };
    const img = listing.images?.[0] || "https://placehold.co/80x80?text=LBB";
    const row = document.createElement("div");
    row.style.cssText = "display:flex; gap:12px; padding:12px 16px; border-bottom:1px solid #f0f0f0;";
    row.innerHTML = `
      <img src="${img}" style="width:64px;height:64px;border-radius:8px;object-fit:cover;">
      <div style="flex:1;">
        <div style="font-weight:600; font-size:14px;">${listing.title}</div>
        ${listing.price ? `<div style="color:#0a1f44; font-weight:700; font-size:13px;">${formatPrice(listing.price)}</div>` : ''}
        <div style="font-size:12px; color:#6b7280; margin-top:2px;">
          Status: <span style="color:${listing.status === 'active' ? '#2e7d32' : '#e53935'}; font-weight:600;">${listing.status}</span>
          · 👁 ${listing.views || 0}
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <button onclick="toggleStatus('${listing.id}', '${listing.status}')" style="font-size:11px; padding:5px 10px; border:1px solid #ddd; border-radius:6px; background:#fff;">
          ${listing.status === 'active' ? 'Sold' : 'Active'}
        </button>
        <button onclick="deleteListing('${listing.id}')" style="font-size:11px; padding:5px 10px; border:1px solid #e53935; color:#e53935; border-radius:6px; background:#fff;">
          Cire
        </button>
      </div>
    `;
    container.appendChild(row);
  });
});

async function toggleStatus(id, currentStatus) {
  const newStatus = currentStatus === "active" ? "sold" : "active";
  await db.collection("listings").doc(id).update({ status: newStatus });
  location.reload();
}

async function deleteListing(id) {
  if (!confirm("Tabbatar kana son cire wannan listing?")) return;
  await db.collection("listings").doc(id).update({ status: "removed" });
  location.reload();
}
</script>
</body>
</html>
