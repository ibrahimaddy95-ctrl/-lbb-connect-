<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search - LBB Connect</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="search-bar" style="background:#0a1f44; padding-top:16px;">
  <input type="text" id="searchInput" placeholder="Nemi kaya, sabis, ko shago..." autofocus>
</div>

<div class="chips" id="categoryChips">
  <div class="chip active" data-type="all">Duka</div>
  <div class="chip" data-type="marketplace">Marketplace</div>
  <div class="chip" data-type="service">Services</div>
  <div class="chip" data-type="directory">Directory</div>
</div>

<div class="listings-grid" id="listingsGrid"></div>

<div class="empty-state" id="emptyState" style="display:none;">
  <p>Rubuta don fara nema...</p>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item"><span class="icon">🏠</span><span>Home</span></a>
  <a href="search.html" class="nav-item active"><span class="icon">🔍</span><span>Search</span></a>
  <a href="post.html" class="nav-item post-btn"><span class="icon">+</span><span>Post</span></a>
  <a href="chat-list.html" class="nav-item"><span class="icon">💬</span><span>Chat</span></a>
  <a href="profile.html" class="nav-item"><span class="icon">👤</span><span>Profile</span></a>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
let currentType = "all";
let allListings = [];
let loaded = false;

async function loadAllListings() {
  if (loaded) return;
  const snapshot = await db.collection("listings")
    .where("status", "==", "active")
    .orderBy("createdAt", "desc")
    .limit(100)
    .get();

  allListings = [];
  snapshot.forEach(doc => allListings.push({ id: doc.id, ...doc.data() }));
  loaded = true;
}

function runSearch() {
  const term = document.getElementById("searchInput").value.toLowerCase().trim();
  const grid = document.getElementById("listingsGrid");
  const emptyState = document.getElementById("emptyState");
  grid.innerHTML = "";

  if (!term) {
    emptyState.style.display = "block";
    emptyState.querySelector("p").textContent = "Rubuta don fara nema...";
    return;
  }

  const filtered = allListings.filter(l =>
    (l.title.toLowerCase().includes(term) ||
     l.category?.toLowerCase().includes(term) ||
     l.description?.toLowerCase().includes(term)) &&
    (currentType === "all" || l.type === currentType)
  );

  if (filtered.length === 0) {
    emptyState.style.display = "block";
    emptyState.querySelector("p").textContent = "Babu sakamako da aka samu.";
    return;
  }
  emptyState.style.display = "none";
  filtered.forEach(listing => grid.appendChild(createListingCard(listing)));
}

document.getElementById("searchInput").addEventListener("input", async () => {
  await loadAllListings();
  runSearch();
});

document.querySelectorAll(".chip").forEach(chip => {
  chip.addEventListener("click", async () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    currentType = chip.dataset.type;
    await loadAllListings();
    runSearch();
  });
});

document.getElementById("emptyState").style.display = "block";
</script>
</body>
</html>
